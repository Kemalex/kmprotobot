version: "3.9"

services:
  proxy-bot:
    build: .
    container_name: tg-proxy-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot_data:/app/data
    environment:
      - DB_PATH=/app/data/proxy_bot.db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot_data:
